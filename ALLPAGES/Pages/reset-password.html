<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scola — Nouveau mot de passe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .logo span { color: #2563eb; }

        .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 2rem;
        }

        label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            display: block;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 40px 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="password"]:focus { border-color: #2563eb; }

        input[type="password"]::placeholder { color: rgba(255, 255, 255, 0.3); }

        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 18px;
        }

        .toggle-eye:hover { color: rgba(255,255,255,0.7); }

        /* Barre de force du mot de passe */
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s, background 0.3s;
        }

        .strength-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            margin-top: 1.25rem;
            padding: 11px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover { background: #1d4ed8; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .message {
            margin-top: 1rem;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .message.succes {
            background: rgba(16, 185, 129, 0.15);
            border: 0.5px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .message.erreur {
            background: rgba(239, 68, 68, 0.15);
            border: 0.5px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back:hover { color: rgba(255, 255, 255, 0.7); }

        /* Ecran succès */
        .success-screen {
            display: none;
            text-align: center;
        }

        .success-icon {
            font-size: 48px;
            color: #10b981;
            margin-bottom: 1rem;
        }

        .success-screen h3 {
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .success-screen p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="card">

    <div id="formSection">
        <div class="logo">Sc<span>o</span>la</div>
        <div class="subtitle">Choisis un nouveau mot de passe</div>

        <form id="resetForm">

            <label for="newPassword">Nouveau mot de passe</label>
            <div class="input-wrap">
                <input type="password" id="newPassword" placeholder="Minimum 6 caractères" required>
                <i class="ti ti-eye toggle-eye" id="toggleNew" onclick="toggleVis('newPassword', 'toggleNew')"></i>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText"></div>

            <label for="confirmPassword" style="margin-top: 1rem;">Confirmer le mot de passe</label>
            <div class="input-wrap">
                <input type="password" id="confirmPassword" placeholder="Répète le mot de passe" required>
                <i class="ti ti-eye toggle-eye" id="toggleConfirm" onclick="toggleVis('confirmPassword', 'toggleConfirm')"></i>
            </div>

            <div class="message" id="message"></div>

            <button class="btn" type="submit" id="btnReset">
                <i class="ti ti-lock-check"></i>
                Réinitialiser le mot de passe
            </button>

        </form>

        <a class="back" href="login.html">
            <i class="ti ti-arrow-left"></i>
            Retour à la connexion
        </a>
    </div>

    <!-- Écran affiché après succès -->
    <div class="success-screen" id="successScreen">
        <div class="success-icon"><i class="ti ti-circle-check"></i></div>
        <h3>Mot de passe mis à jour !</h3>
        <p>Tu peux maintenant te connecter avec ton nouveau mot de passe.</p>
        <a class="btn" href="login.html" style="text-decoration: none;">
            <i class="ti ti-login"></i>
            Se connecter
        </a>
    </div>

</div>

<script>
    // Récupère le token depuis l'URL
    // ex: reset-password.html?token=abc123
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Si pas de token dans l'URL → lien invalide
    if (!token) {
        document.getElementById('message').className = 'message erreur';
        document.getElementById('message').textContent = '❌ Lien invalide ou expiré.';
        document.getElementById('message').style.display = 'block';
        document.getElementById('btnReset').disabled = true;
    }

    // Affiche/cache le mot de passe
    function toggleVis(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'ti ti-eye-off toggle-eye';
        } else {
            input.type = 'password';
            icon.className = 'ti ti-eye toggle-eye';
        }
    }

    // Barre de force du mot de passe
    document.getElementById('newPassword').addEventListener('input', function () {
        const val = this.value;
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');

        let force = 0;
        if (val.length >= 6) force++;
        if (val.length >= 10) force++;
        if (/[A-Z]/.test(val)) force++;
        if (/[0-9]/.test(val)) force++;
        if (/[^a-zA-Z0-9]/.test(val)) force++;

        const niveaux = [
            { label: '', color: 'transparent', width: '0%' },
            { label: 'Très faible', color: '#ef4444', width: '20%' },
            { label: 'Faible', color: '#f97316', width: '40%' },
            { label: 'Moyen', color: '#eab308', width: '60%' },
            { label: 'Fort', color: '#22c55e', width: '80%' },
            { label: 'Très fort', color: '#10b981', width: '100%' },
        ];

        const n = niveaux[force];
        fill.style.width = n.width;
        fill.style.background = n.color;
        text.textContent = n.label;
        text.style.color = n.color;
    });

    // Soumission du formulaire
    document.getElementById('resetForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const password = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('btnReset');
        const msg = document.getElementById('message');

        // Vérifie que les deux mots de passe correspondent
        if (password !== confirm) {
            msg.className = 'message erreur';
            msg.textContent = '❌ Les mots de passe ne correspondent pas.';
            msg.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            msg.className = 'message erreur';
            msg.textContent = '❌ Minimum 6 caractères.';
            msg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="ti ti-loader-2"></i> Traitement...';
        msg.style.display = 'none';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });

            const data = await res.json();

            if (res.ok) {
                // Cache le formulaire et affiche l'écran succès
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
            } else {
                msg.className = 'message erreur';
                msg.textContent = '❌ ' + (data.message || 'Lien invalide ou expiré.');
                msg.style.display = 'block';
            }

        } catch (err) {
            msg.className = 'message erreur';
            msg.textContent = '❌ Erreur serveur. Réessaie dans quelques instants.';
            msg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="ti ti-lock-check"></i> Réinitialiser le mot de passe';
        }
    });
</script>

</body>
</html>
